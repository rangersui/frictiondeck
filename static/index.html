<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>FrictionDeck</title>
<style>*{margin:0;padding:0}html,body{height:100%;background:#0a0a0a}iframe{width:100%;height:100%;border:none;display:block}</style>
</head><body>
<iframe id="f" sandbox="allow-scripts allow-same-origin allow-popups" srcdoc=""></iframe>
<script>
const s=window.location.pathname.slice(1)||'default';let v=0;
const o=location.origin;
const csp='<meta http-equiv="Content-Security-Policy" content="default-src '+o+' data: blob: https:; script-src \'unsafe-inline\' \'unsafe-eval\' https: data: blob:; style-src \'unsafe-inline\' https: data:; img-src * data: blob:; media-src * data: blob:; font-src * data:; connect-src '+o+'">';
async function p(){try{const d=await(await fetch('/api/'+s+'/stage')).json();if(d.version>v){v=d.version;document.getElementById('f').srcdoc=csp+(d.stage_html||'')}}catch(_){}}
p();setInterval(p,1000);
</script>
</body></html>
