<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FrictionDeck</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #e0e0e0; font-family: monospace; font-size: 13px; height: 100vh; display: flex; flex-direction: column; }
nav { padding: 8px 16px; border-bottom: 1px solid #1e1e1e; background: #141414; display: flex; gap: 16px; align-items: center; }
nav .tab { cursor: pointer; color: #666; }
nav .tab.active { color: #00ff88; }
nav .spacer { flex: 1; }
nav .version { color: #666; font-size: 11px; }
#canvas { flex: 1; overflow: auto; }
#log { flex: 1; overflow: auto; padding: 16px; }
#commit-display { flex: 1; overflow: auto; padding: 16px; }
#commit-controls { padding: 8px 16px; border-top: 1px solid #1e1e1e; display: flex; gap: 8px; align-items: center; }
pre { white-space: pre-wrap; word-break: break-all; font-size: 12px; }
</style>
</head>
<body>

<nav id="fd-chrome">
    <span style="color:#00ff88;font-weight:bold">FrictionDeck</span>
    <span class="tab active" data-view="stage">Stage</span>
    <span class="tab" data-view="log">Log</span>
    <span class="tab" data-view="commit">Commit</span>
    <span class="spacer"></span>
    <span class="version" id="version-label">v0</span>
</nav>

<main id="canvas"><iframe id="stage-frame" sandbox="allow-scripts" srcdoc="" style="width:100%;height:100%;border:none;display:block"></iframe></main>
<div id="log" hidden><pre id="log-content"></pre></div>
<div id="commit-display" hidden><div id="commit-list"></div></div>
<div id="commit-controls" hidden>
    <button onclick="approveCommit()">Approve</button>
    <button onclick="rejectCommit()">Reject</button>
</div>

<script>
let stageVersion = 0;

document.querySelectorAll('nav .tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('nav .tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const v = tab.dataset.view;
        document.getElementById('canvas').hidden = v !== 'stage';
        document.getElementById('log').hidden = v !== 'log';
        document.getElementById('commit-display').hidden = v !== 'commit';
        document.getElementById('commit-controls').hidden = v !== 'commit';
        if (v === 'log') loadLog();
        if (v === 'commit') loadProposals();
    });
});

async function loadLog() {
    try {
        const res = await fetch('/api/commits');
        const data = await res.json();
        document.getElementById('log-content').textContent = JSON.stringify(data, null, 2);
    } catch (e) {
        document.getElementById('log-content').textContent = 'Failed to load.';
    }
}

async function loadProposals() {
    try {
        const res = await fetch('/api/proposals');
        const data = await res.json();
        const list = document.getElementById('commit-list');
        if (!data.length) { list.innerHTML = 'No pending proposals.'; return; }
        list.innerHTML = data.map((p, i) =>
            '<div><label><input type="radio" name="proposal" value="' + p.proposal_id + '"' +
            (i === 0 ? ' checked' : '') + '> ' +
            p.proposal_id.slice(0, 8) + ' | ' + (p.timestamp || '').slice(0, 19) + ' | ' +
            (p.message || '').slice(0, 100) + '</label></div>'
        ).join('');
    } catch (e) {
        document.getElementById('commit-list').textContent = 'Failed to load.';
    }
}

function getSelectedProposal() {
    const r = document.querySelector('input[name="proposal"]:checked');
    return r ? r.value : null;
}

async function approveCommit() {
    const pid = getSelectedProposal();
    if (!pid) { alert('No proposal selected.'); return; }
    try {
        const result = await (await fetch('/api/commit/approve?proposal_id=' + pid, {
            method: 'POST'
        })).json();
        alert(result.error || 'Committed: ' + result.commit_id);
        loadProposals();
    } catch (e) { alert('Error: ' + e.message); }
}

async function rejectCommit() {
    const pid = getSelectedProposal();
    if (!pid) { alert('No proposal selected.'); return; }
    const reason = prompt('Rejection reason:');
    if (!reason) return;
    try {
        await fetch('/api/commit/reject?proposal_id=' + pid + '&reason=' + encodeURIComponent(reason), {
            method: 'POST'
        });
        loadProposals();
    } catch (e) { alert('Error: ' + e.message); }
}

async function pollStage() {
    try {
        const res = await fetch('/api/stage');
        const data = await res.json();
        if (data.version && data.version > stageVersion) {
            stageVersion = data.version;
            document.getElementById('version-label').textContent = 'v' + stageVersion;
            if (data.stage_html != null) document.getElementById('stage-frame').srcdoc = data.stage_html;
        }
    } catch (_) {}
}

pollStage();
setInterval(pollStage, 1000);
</script>
</body>
</html>
