name: Plugin Tests

on:
  push:
    branches: [master]
    paths:
      - 'plugins/**'
      - 'server.py'
      - 'plugins.py'
      - 'tests/test_plugins.py'
      - '.github/workflows/plugins.yml'
  pull_request:
    paths:
      - 'plugins/**'
      - 'server.py'
      - 'plugins.py'
      - 'tests/test_plugins.py'
      - '.github/workflows/plugins.yml'

jobs:
  test:
    name: plugin tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run plugin tests
        env:
          PYTHONUTF8: 1
        run: python tests/test_plugins.py python
