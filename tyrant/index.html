<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>elastik tyrant</title>
<style>
*{margin:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a0a;color:#e0e0e0;height:100vh;display:flex;flex-direction:column}
#top-bar{padding:8px 16px;background:#111;border-bottom:1px solid #222;display:flex;align-items:center;gap:12px;font-size:13px;flex-shrink:0}
#top-bar .logo{font-weight:700;color:#fff;font-size:15px}
#top-bar .status{color:#666;flex:1}
#top-bar .gpu-badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.gpu-on{background:#1a3a1a;color:#4f4}
.gpu-off{background:#3a1a1a;color:#f44}
#main{flex:1;display:flex;overflow:hidden}
#sidebar{width:220px;background:#0f0f0f;border-right:1px solid #222;overflow-y:auto;flex-shrink:0}
#sidebar a{display:block;padding:10px 16px;color:#aaa;text-decoration:none;border-bottom:1px solid #1a1a1a;font-size:13px}
#sidebar a:hover{background:#1a1a1a;color:#fff}
#sidebar a.active{background:#1a2a1a;color:#4f4;border-left:3px solid #4f4}
#content{flex:1;display:flex;flex-direction:column;overflow:hidden}
#view{flex:1;border:none;background:#0a0a0a}
#input-bar{padding:8px 16px;background:#111;border-top:1px solid #222;display:flex;gap:8px}
#input-bar input{flex:1;background:#1a1a1a;border:1px solid #333;color:#fff;padding:8px 12px;border-radius:6px;font-size:14px;outline:none}
#input-bar input:focus{border-color:#4f4}
#input-bar button{background:#1a3a1a;color:#4f4;border:1px solid #2a4a2a;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px}
#input-bar button:hover{background:#2a4a2a}
#llm-panel{display:none;width:360px;background:#0f0f0f;border-left:1px solid #222;flex-direction:column;flex-shrink:0}
#llm-panel.open{display:flex}
#llm-panel .header{padding:12px 16px;border-bottom:1px solid #222;font-weight:600;display:flex;justify-content:space-between;align-items:center}
#llm-panel .messages{flex:1;overflow-y:auto;padding:12px}
#llm-panel .msg{margin-bottom:12px;padding:8px 12px;border-radius:8px;font-size:13px;line-height:1.5;white-space:pre-wrap}
#llm-panel .msg.user{background:#1a2a3a;color:#8cf;margin-left:24px}
#llm-panel .msg.ai{background:#1a1a2a;color:#ccc;margin-right:24px}
#llm-panel .msg.system{background:#2a2a1a;color:#cc8;font-size:11px;text-align:center}
#llm-input{padding:8px;border-top:1px solid #222;display:flex;gap:6px}
#llm-input input{flex:1;background:#1a1a1a;border:1px solid #333;color:#fff;padding:8px;border-radius:6px;font-size:13px;outline:none}
#llm-input button{background:#1a1a3a;color:#88f;border:1px solid #2a2a4a;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:12px}
</style>
</head>
<body>
<div id="top-bar">
  <span class="logo">elastik</span>
  <span class="status" id="status">connecting...</span>
  <span class="gpu-badge" id="gpu-badge">...</span>
  <button onclick="toggleLLM()" style="background:none;border:1px solid #333;color:#888;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px">AI</button>
</div>
<div id="main">
  <div id="sidebar" id="world-list"></div>
  <div id="content">
    <iframe id="view" sandbox="allow-scripts allow-popups"></iframe>
    <div id="input-bar">
      <input id="cmd" placeholder="write to current world..." onkeydown="if(event.key==='Enter')doWrite()">
      <button onclick="doWrite()">write</button>
    </div>
  </div>
  <div id="llm-panel">
    <div class="header">
      <span>AI <span id="llm-model" style="color:#666;font-weight:400;font-size:11px"></span></span>
      <button onclick="toggleLLM()" style="background:none;border:none;color:#666;cursor:pointer;font-size:16px">&times;</button>
    </div>
    <div class="messages" id="llm-messages"></div>
    <div id="llm-input">
      <input id="llm-cmd" placeholder="ask AI..." onkeydown="if(event.key==='Enter')doAsk()">
      <button onclick="doAsk()">send</button>
    </div>
  </div>
</div>

<script type="module">
// ─── BUS ─────────────────────────────────────────────
// The bus is wherever server.py (or equivalent) lives.
// Default: same origin. Override: ?bus=http://other:3005
const params = new URLSearchParams(location.search);
const BUS = (params.get('bus') || location.origin).replace(/\/+$/, '');

async function api(path, method = 'GET', body = null) {
  const opts = { method };
  if (body !== null) opts.body = typeof body === 'string' ? body : JSON.stringify(body);
  const r = await fetch(BUS + path, opts);
  if (path === '/' && method === 'GET') return r.text();
  return r.json();
}

// ─── STATE ───────────────────────────────────────────
let worlds = [];
let current = null;
let currentVersion = -1;

// ─── GPU DETECT ──────────────────────────────────────
let hasGPU = false;
let gpuInfo = 'no WebGPU';
try {
  if (!navigator.gpu) {
    gpuInfo = 'navigator.gpu missing — browser blocks WebGPU (Brave: brave://flags/#enable-unsafe-webgpu)';
  } else {
    const adapter = await navigator.gpu.requestAdapter({ powerPreference: 'high-performance' });
    if (adapter) {
      hasGPU = true;
      gpuInfo = adapter.info?.device || adapter.info?.description || 'WebGPU ready';
    } else {
      gpuInfo = 'requestAdapter() returned null — no usable GPU backend';
    }
  }
} catch (e) { gpuInfo = `WebGPU error: ${e.message}`; }

const badge = document.getElementById('gpu-badge');
badge.textContent = hasGPU ? 'GPU' : 'CPU';
badge.className = 'gpu-badge ' + (hasGPU ? 'gpu-on' : 'gpu-off');
badge.title = gpuInfo;

// ─── LLM ENGINE ──────────────────────────────────────
let llmEngine = null;
let llmReady = false;

async function initLLM() {
  const msgEl = document.getElementById('llm-messages');
  const modelEl = document.getElementById('llm-model');

  if (hasGPU) {
    addMsg('system', `WebGPU available: ${gpuInfo}`);
    addMsg('system', 'type /webllm to load local model (needs HuggingFace access)');
  }
  // Default to API mode
  modelEl.textContent = hasGPU ? 'GPU ready, API mode' : 'API mode';
  addMsg('system', 'set API endpoint: /api <url> <key>');
  addMsg('system', 'or use elastik as backend: /elastik <ollama-url>');
  llmReady = true;
}

let apiEndpoint = null;
let apiKey = null;

async function inference(messages) {
  if (llmEngine) {
    // Local WebLLM
    const r = await llmEngine.chat.completions.create({ messages, temperature: 0.7, max_tokens: 1024 });
    return r.choices[0].message.content;
  } else if (apiEndpoint) {
    // Remote API
    const r = await fetch(apiEndpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey || ''}` },
      body: JSON.stringify({ messages, model: 'gpt-4o-mini', max_tokens: 1024 })
    });
    const d = await r.json();
    return d.choices?.[0]?.message?.content || JSON.stringify(d);
  } else {
    return 'no LLM available. load WebLLM (need WebGPU) or set /api <endpoint> <key>';
  }
}

// ─── WORLD MANAGEMENT ────────────────────────────────
async function loadWorlds() {
  try {
    const stages = await api('/stages');
    worlds = stages;
    renderSidebar();
    document.getElementById('status').textContent = `${worlds.length} worlds | bus: ${BUS}`;
  } catch (e) {
    document.getElementById('status').textContent = `disconnected: ${e.message}`;
  }
}

function renderSidebar() {
  const el = document.getElementById('sidebar');
  el.innerHTML = worlds.map(w =>
    `<a href="#" onclick="selectWorld('${w.name}');return false" class="${w.name === current ? 'active' : ''}">${w.name} <span style="color:#555;font-size:11px">v${w.version}</span></a>`
  ).join('') + `<a href="#" onclick="newWorld();return false" style="color:#4f4;text-align:center">+ new world</a>`;
}

async function selectWorld(name) {
  current = name;
  currentVersion = -1;
  renderSidebar();
  await poll();
}

// ─── BRIDGE ──────────────────────────────────────────
// Injected into iframe. Gives world JS access to __elastik.fetch(), .action(), .sync(), .result(), .clear()
// Same API as Normal mode. iframe can't escape sandbox — must go through postMessage.
function _bridge(worldName) {
  return '<script>window.__elastik={_p:{},_w:"'+worldName+'",fetch:function(path){return new Promise(function(ok,no){var id=Math.random().toString(36).slice(2);window.__elastik._p[id]={resolve:ok,reject:no};window.parent.postMessage({_elastik:true,action:"fetch",path:path,_id:id},"*")})},action:function(route,body){return new Promise(function(ok,no){var id=Math.random().toString(36).slice(2);window.__elastik._p[id]={resolve:ok,reject:no};window.parent.postMessage({_elastik:true,action:"action",route:route,body:body||"",_id:id},"*")})},sync:function(d){window.parent.postMessage({_elastik:true,action:"sync",payload:d},"*")},result:function(d){window.parent.postMessage({_elastik:true,action:"result",payload:d},"*")},clear:function(){window.parent.postMessage({_elastik:true,action:"clear"},"*")}};window.addEventListener("message",function(e){if(e.data&&e.data._elastik_response&&e.data._id){var q=window.__elastik._p[e.data._id];if(q){delete window.__elastik._p[e.data._id];if(e.data.error)q.reject(new Error(e.data.error));else q.resolve(e.data.result)}}if(e.data&&e.data._elastik_exec){try{var r=eval(e.data.code);window.parent.postMessage({_elastik:true,action:"result",payload:String(r==null?"":r)},"*")}catch(err){window.parent.postMessage({_elastik:true,action:"result",payload:"ERROR:"+err.message},"*")}}})<\/script>';
}

function injectBridge(html, worldName) {
  const b = _bridge(worldName);
  if (html.includes('</head>')) return html.replace('</head>', b + '</head>');
  if (html.includes('<body')) return html.replace(/<body[^>]*>/i, m => m + b);
  return b + html;
}

// Parent-side message handler — broker between iframe and bus
const view = document.getElementById('view');
window.addEventListener('message', async function(e) {
  if (!e.data || !e.data._elastik) return;
  const { action, _id, path, payload } = e.data;
  if (action === 'fetch') {
    try { const r = await api(path); view.contentWindow.postMessage({ _elastik_response: true, _id, result: r }, '*'); }
    catch (err) { view.contentWindow.postMessage({ _elastik_response: true, _id, error: err.message }, '*'); }
  } else if (action === 'sync') {
    api(`/${current}/sync`, 'POST', payload || '');
  } else if (action === 'result') {
    api(`/${current}/result`, 'POST', payload || '');
  } else if (action === 'clear') {
    api(`/${current}/clear`, 'POST');
  // ─── TODO: NAVIGATE HANDLER ──────────────
  // iframe里的window.location跳转拦截
  // Normal模式有 Tyrant暂不需要
  // 补的时候在这里加: else if (action === 'navigate') { ... }

  } else if (action === 'action') {
    // ─── TODO: ACTION WHITELIST ──────────────
    // Normal模式从config-actions world读白名单
    // Tyrant没有plugin → 暂时全放行
    // 有前端plugin之后在这里加白名单逻辑
    try { const r = await api(e.data.route, 'POST', e.data.body || ''); view.contentWindow.postMessage({ _elastik_response: true, _id, result: r }, '*'); }
    catch (err) { view.contentWindow.postMessage({ _elastik_response: true, _id, error: err.message }, '*'); }
  }
});

async function poll() {
  if (!current) return;
  try {
    const r = await api(`/${current}/read`);
    if (r.version !== currentVersion) {
      currentVersion = r.version;
      const html = r.stage_html || '<div style="padding:40px;color:#666;font-family:system-ui">empty world</div>';
      // Support <!--use:renderer-xxx--> pattern
      const um = /^<!--use:([a-zA-Z0-9_-]+)-->\n?([\s\S]*)/.exec(html);
      if (um) {
        try {
          const rr = await api(`/${um[1]}/read`);
          if (rr.stage_html) {
            view.srcdoc = injectBridge(rr.stage_html.replace('</head>', '<script>window.__ELASTIK_DATA__=' + JSON.stringify(um[2]) + '<\/script></head>'), current);
          } else { view.srcdoc = injectBridge(html, current); }
        } catch (e) { view.srcdoc = injectBridge(html, current); }
      } else {
        view.srcdoc = injectBridge(html, current);
      }
    }
    // pending_js: remote AI can inject JS into iframe
    if (r.pending_js && r.pending_js !== lastPendingJs) {
      lastPendingJs = r.pending_js;
      view.contentWindow.postMessage({ _elastik_exec: true, code: r.pending_js }, '*');
    }
  } catch (e) { /* retry next tick */ }
}
let lastPendingJs = '';

function newWorld() {
  const name = prompt('world name:');
  if (name && /^[a-zA-Z0-9][a-zA-Z0-9_-]*$/.test(name)) {
    api(`/${name}/write`, 'POST', '').then(() => { loadWorlds(); selectWorld(name); });
  }
}

// ─── WRITE ───────────────────────────────────────────
window.doWrite = async function() {
  if (!current) return;
  const input = document.getElementById('cmd');
  const text = input.value.trim();
  if (!text) return;
  await api(`/${current}/write`, 'POST', text);
  input.value = '';
  await poll();
};

// ─── AI WRITE (approve flow) ─────────────────────────
// AI proposes → human approves → world gets written. Same as Normal's approve, but a button instead of a terminal.
async function aiWrite(world, content) {
  const el = document.getElementById('llm-messages');
  const preview = content.length > 200 ? content.slice(0, 200) + '...' : content;
  addMsg('ai', `write to ${world}:\n${preview}`);
  const bar = document.createElement('div');
  bar.style.cssText = 'display:flex;gap:6px;margin-bottom:12px';
  const approve = document.createElement('button');
  approve.textContent = 'Approve';
  approve.style.cssText = 'background:#1a3a1a;color:#4f4;border:1px solid #2a4a2a;padding:6px 16px;border-radius:6px;cursor:pointer';
  const reject = document.createElement('button');
  reject.textContent = 'Reject';
  reject.style.cssText = 'background:#3a1a1a;color:#f44;border:1px solid #4a2a2a;padding:6px 16px;border-radius:6px;cursor:pointer';
  approve.onclick = async () => { await api(`/${world}/write`, 'POST', content); addMsg('system', `approved → wrote to ${world}`); bar.remove(); await poll(); };
  reject.onclick = () => { addMsg('system', 'rejected'); bar.remove(); };
  bar.appendChild(approve); bar.appendChild(reject);
  el.appendChild(bar); el.scrollTop = el.scrollHeight;
}

// ─── LLM PANEL ───────────────────────────────────────
let chatHistory = [];
const MAX_CHAT = 20;

window.toggleLLM = function() {
  const panel = document.getElementById('llm-panel');
  const isOpen = panel.classList.toggle('open');
  if (isOpen && !llmReady) initLLM();
};

function addMsg(role, text) {
  const el = document.getElementById('llm-messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

window.doAsk = async function() {
  const input = document.getElementById('llm-cmd');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  // Commands
  if (text === '/webllm' || text.startsWith('/webllm ')) {
    if (!hasGPU) { addMsg('system', 'no WebGPU available'); return; }
    const model = text.split(' ')[1] || 'Qwen2.5-0.5B-Instruct-q4f16_1-MLC';
    addMsg('system', `loading ${model}...`);
    try {
      const webllm = await import('https://esm.run/@mlc-ai/web-llm');
      llmEngine = await webllm.CreateMLCEngine(model, {
        initProgressCallback: (p) => {
          document.getElementById('llm-model').textContent = `${model} (${Math.round(p.progress * 100)}%)`;
        }
      });
      document.getElementById('llm-model').textContent = model;
      addMsg('system', `local GPU inference ready: ${model}`);
    } catch (e) { addMsg('system', `WebLLM failed: ${e.message}`); }
    return;
  }
  if (text.startsWith('/api ')) {
    const parts = text.slice(5).split(' ');
    apiEndpoint = parts[0];
    apiKey = parts[1] || '';
    addMsg('system', `API set: ${apiEndpoint}`);
    return;
  }
  if (text.startsWith('/write ') && current) {
    const content = text.slice(7);
    await api(`/${current}/write`, 'POST', content);
    addMsg('system', `wrote to ${current}`);
    await poll();
    return;
  }
  if (text.startsWith('/read') && current) {
    const r = await api(`/${current}/read`);
    addMsg('system', `${current} (v${r.version}):\n${r.stage_html?.slice(0, 500) || '(empty)'}`);
    return;
  }

  // Chat with context
  addMsg('user', text);
  chatHistory.push({ role: 'user', content: text });

  // Inject current world as context
  let systemMsg = 'You are an elastik AI assistant. You write into worlds (key-value stores accessible via HTTP).';
  if (current) {
    try {
      const r = await api(`/${current}/read`);
      systemMsg += `\n\nCurrent world "${current}" content:\n${r.stage_html?.slice(0, 2000) || '(empty)'}`;
    } catch (e) { /* no context */ }
  }

  if (chatHistory.length > MAX_CHAT) chatHistory = chatHistory.slice(-MAX_CHAT);
  const messages = [{ role: 'system', content: systemMsg }, ...chatHistory];

  try {
    addMsg('system', 'thinking...');
    const reply = await inference(messages);
    // Remove "thinking..." message
    const msgs = document.getElementById('llm-messages');
    msgs.removeChild(msgs.lastChild);
    // Detect AI wanting to write: if reply contains HTML block or ```html, offer approve
    const htmlMatch = reply.match(/```html\n([\s\S]*?)```/) || reply.match(/(<(!DOCTYPE|html|head|body|div|h[1-6]|p|style|script)[^>]*>[\s\S]{20,})/i);
    if (htmlMatch && current) {
      const proposed = htmlMatch[1];
      addMsg('ai', reply);
      aiWrite(current, proposed);
    } else {
      addMsg('ai', reply);
    }
    chatHistory.push({ role: 'assistant', content: reply });
  } catch (e) {
    const msgs = document.getElementById('llm-messages');
    msgs.removeChild(msgs.lastChild);
    addMsg('system', `error: ${e.message}`);
  }
};

// ─── TODO: FRONT-END PLUGINS ─────────────
// 从plugin-* world读JS → eval注册能力
// 前端版热插拔plugin
// 补的时候在loadWorlds()之后加loadPlugins()

// ─── INIT ────────────────────────────────────────────
await loadWorlds();
setInterval(loadWorlds, 10000);
setInterval(poll, 1000);

// Make functions global for onclick handlers
window.selectWorld = selectWorld;
window.newWorld = newWorld;
</script>
</body></html>
